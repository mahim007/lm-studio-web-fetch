services:
  web-tools-mcp:
    build: .
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s